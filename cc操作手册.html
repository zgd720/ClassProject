    const tocContainer = document.getElementById('tocLinks');
    function buildTOC() {
        const frag = document.createDocumentFragment();
        headings.forEach((h, idx) => {
            let id = h.id;
            if (!id) { id = 'h-' + idx; h.id = id; }
            const a = document.createElement('a');
            a.href = '#' + id;
            a.textContent = h.textContent.replace(/[🔧📄🏗️📜🧩💾🔄📂⚙️💰📋💡⚠️🗓️]/g, '').trim();
            a.addEventListener('click', (e) => {
                e.preventDefault();
                h.scrollIntoView({ behavior: 'smooth' });
                setActive(a);
            });
            const li = document.createElement('li');
            li.appendChild(a);
            frag.appendChild(li);
        });
        tocContainer.innerHTML = '';
        tocContainer.appendChild(frag);
    }
    function setActive(active) {
        document.querySelectorAll('.toc-links a').forEach(link => link.classList.remove('active'));
        active.classList.add('active');
    }
    function observeActive() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;
                    const link = tocContainer.querySelector('a[href="#' + id + '"]');
                    if (link) setActive(link);
                }
            });
        }, { rootMargin: '-30px 0px -60% 0px', threshold: 0.3 });
        headings.forEach(h => observer.observe(h));
    }
    buildTOC();
    observeActive();

    // 复制按钮
    document.querySelectorAll('pre').forEach(pre => {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.innerHTML = '<i class="far fa-copy"></i> 复制';
        btn.addEventListener('click', () => {
            const code = pre.querySelector('code');
            const text = code ? code.innerText : pre.innerText;
            navigator.clipboard.writeText(text);
            btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
            setTimeout(() => btn.innerHTML = '<i class="far fa-copy"></i> 复制', 1800);
        });
        pre.style.position = 'relative';
        pre.appendChild(btn);
    });
    hljs.highlightAll();

    // 深色模式
    const toggleBtn = document.getElementById('themeToggle');
    const isDark = localStorage.getItem('darkMode') === 'true';
    if (isDark) document.body.classList.add('dark');
    const updateBtn = () => {
        if (document.body.classList.contains('dark')) toggleBtn.innerHTML = '<i class="fas fa-sun"></i> <span>亮色模式</span>';
        else toggleBtn.innerHTML = '<i class="fas fa-moon"></i> <span>深色模式</span>';
    };
    updateBtn();
    toggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        updateBtn();
    });
</script>
</body>
</html>
